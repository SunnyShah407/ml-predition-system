data:
  csv_path: "data/raw/synthetic_tenders.csv"
  target: "winning_total_price"
  drop_columns:
    - "tender_id"
    - "created_at"
  test_size: 0.2
  random_state: 42

output:
  artifacts_dir: "artifacts/tender_regression"
  reports_dir: "reports"

models:
  linear: true
  ridge: true
  lasso: true
  svr: true
  decision_tree: true
  random_forest: true
  xgboost: false

training:
  ridge_alpha: 1.0
  lasso_alpha: 0.001
  svr_c: 10.0
  svr_epsilon: 0.1
  decision_tree_max_depth: 12
  random_forest_n_estimators: 400
  random_forest_max_depth: 18
  xgboost_n_estimators: 600
  xgboost_max_depth: 8
  xgboost_learning_rate: 0.05
  xgboost_subsample: 0.9
  xgboost_colsample_bytree: 0.9
